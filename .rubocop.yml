AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented
Metrics/ClassLength:
  Enabled: false
Layout/LineLength:
  Max: 120
Metrics/BlockLength:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
Metrics/AbcSize:
  Enabled: false
Naming/FileName:
  Exclude:
    - lib/safe-pg-migrations.rb
Style/BlockDelimiters:
  Enabled: false
Style/Documentation:
    Enabled: false
Style/ClassAndModuleChildren:
  Enabled: false
Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma
Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: comma
Style/NumericPredicate:
  Enabled: false
Style/OptionalBooleanParameter:
  Enabled: false
# Style cops introduced in rubocop > 1.53 that require code changes unrelated to the Ruby upgrade.
# To be addressed in a separate PR.
Naming/BlockForwarding:
  Enabled: false
Style/ArgumentsForwarding:
  Enabled: false
Style/ComparableBetween:
  Enabled: false
Style/SuperArguments:
  Enabled: false
